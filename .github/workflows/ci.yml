name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tracker_test
          POSTGRES_USER: tracker
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-internal 10s
          --health-timeout 5s
          --health-retires 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: cuatro-tracker/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: cuatro-tracker
        run: pnpm install --frozen-lockfile

      - name: Generate prisma client
        working-directory: cuatro-tracker
        run: pnpm prisma generate

      - name: Apply migrations
        working-directory: cuatro-tracker
        env:
          DATABASE_URL: postgresql://trakcer:test@localhost:5432/tracker_test
        run: pnpm prisma migrate deploy

      - name: Run tests
        working-directory: cuatro-tracker
        env:
          DATABASE_URL: postgresql://trakcer:test@localhost:5432/tracker_test
        run: pnpm test --coverage

      - name: Typecheck
        working-directory: cuatro-tracker
        run: pnpm typecheck
