# Local development. Two usage modes:
#
# Infra only (most common - app runs via pnpm dev):
#   docker compose -f docker-compose.dev.yml up -d
#
# Full stack local test (caddy serves http://localhost, no cert):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=tracker
      - POSTGRES_USER=tracker
      - "POSTGRES_PASSWORD=${DB_PASS:?DB_PASS is required; see .env.example}"
    ports:
      - "5432:5432"
    volumes:
      - pg_dev_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "tracker", "-d", "tracker" ]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg_dev_data:
  redis_dev_data:
