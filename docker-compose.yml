services:
  caddy:
    build:
      context: .
      dockerfile: docker/Dockerfile.caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      HETZNER_DNS_API_TOKEN: ${HETZNER_DNS_API_TOKEN}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: builder
    working_dir: /app
    command: ["node", "node_modules/.bin/prisma", "migrate", "deploy"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      - DATABASE_URL=postgresql://tracker:${DB_PASS}@postgres:5432/tracker
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - TMDB_API_KEY=${TMDB_API_KEY}
      - IGDB_CLIENT_ID=${IGDB_CLIENT_ID}
      - IGDB_CLIENT_SECRET=${IGDB_CLIENT_SECRET}
      - STEAM_API_KEY=${STEAM_API_KEY}
      - STEAM_USER_ID=${STEAM_USER_ID}
      - QBITTORRENT_HOST=http://qbittorrent:8080
      - QBITTORRENT_USER=${QBITTORRENT_USER}
      - QBITTORRENT_PASS=${QBITTORRENT_PASS}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=tracker
      - POSTGRES_USER=tracker
      - POSTGRES_PASSWORD=${DB_PASS}
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  qbittorrent:
    image: linuxserver/qbittorrent:latest
    environment:
      - WEBUI_PORT=8080
      - PUID=1000
      - PGID=1000
    volumes:
      - qb_config:/config
      - ${DOWNLOAD_PATH:-/tmp/downloads}:/downloads
    restart: unless-stopped
    # Internal only - never expose port 8080 externally

volumes:
  caddy_data:
  caddy_config:
  pg_data:
  redis_data:
  qb_config:
